name: Extract projeto.zip

on:
  workflow_dispatch:
  push:
    paths:
      - "projeto.zip"
      - ".github/workflows/extrair.yml"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Mostrar arquivos
        run: |
          pwd
          ls -la

      - name: Verificar se projeto.zip existe
        run: |
          if [ ! -f "projeto.zip" ]; then
            echo "ERRO: projeto.zip não está na raiz do repositório"
            exit 1
          fi

      - name: Testar zip
        run: |
          unzip -t projeto.zip

      - name: Extrair projeto.zip
        run: |
          rm -rf projeto
          mkdir -p projeto
          unzip -o projeto.zip -d projeto
          ls -la projeto

      - name: Salvar pasta extraída
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add projeto
          git status
          git commit -m "Extrair projeto.zip" || echo "Nada novo para salvar"
          git push
